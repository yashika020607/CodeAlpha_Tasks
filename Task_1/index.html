<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Icons -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >
</head>

<body>

    <div class="music-player">

        <!-- Heading -->
        <h1>Music Player</h1>

        <!-- Album Image -->
        <div class="cover">
            <img id="cover-image"
                 src="images/cover1.jpg"
                 alt="Album Cover">
        </div>

        <!-- Song Details -->
        <div class="song-details">

            <h2 id="song-title">
                Shape of You
            </h2>

            <p id="artist-name">
                Ed Sheeran
            </p>

        </div>

        <!-- Audio -->
        <audio id="audio">

            <source
                src="songs/song1.mp3"
                type="audio/mp3">

        </audio>

        <!-- Progress -->

        <div class="progress-container">

            <span id="current-time">
                0:00
            </span>

            <input
                type="range"
                id="progress-bar"
                min="0"
                max="100"
                value="0">

            <span id="duration">
                0:00
            </span>

        </div>

        <!-- Controls -->

        <div class="controls">

            <button id="prev">

                <i class="fa-solid fa-backward"></i>

            </button>

            <button id="play">

                <i class="fa-solid fa-play"></i>

            </button>

            <button id="pause">

                <i class="fa-solid fa-pause"></i>

            </button>

            <button id="next">

                <i class="fa-solid fa-forward"></i>

            </button>

        </div>

        <!-- Volume -->

        <div class="volume">

            <i class="fa-solid fa-volume-high"></i>

            <input
                type="range"
                id="volume"
                min="0"
                max="1"
                step="0.01"
                value="1">

        </div>

        <!-- Playlist -->

        <div class="playlist">

            <h3>Playlist</h3>

            <ul id="playlist">

                <li>Shape of You - Ed Sheeran</li>

                <li>Perfect - Ed Sheeran</li>

                <li>Believer - Imagine Dragons</li>

            </ul>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
